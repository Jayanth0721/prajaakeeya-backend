stages:
  - build
  - deploy

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

build_backend:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    expire_in: 1 hour
    paths:
      - dist/
      - package.json
      - package-lock.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy_backend:
  stage: deploy
  tags: [ec2-deploy]   # must match your EC2 runner tag
  dependencies:
    - build_backend
  script:
    - set -euo pipefail

    - APP_DIR="/var/www/prajaakeeya-api"

    # Ensure destination exists and is owned by deploy
    - sudo -n mkdir -p "$APP_DIR"
    - sudo -n chown -R deploy:deploy "$APP_DIR"

    # Copy artifacts into place (as deploy)
    - sudo -n -u deploy rm -rf "$APP_DIR/dist"
    - sudo -n -u deploy cp -r dist "$APP_DIR/"
    - sudo -n -u deploy cp package.json package-lock.json "$APP_DIR/"

    # Install production deps (as deploy)
    - sudo -n -u deploy bash -lc "cd '$APP_DIR' && npm ci --omit=dev"

    # Ensure pm2 exists (root install once; safe to rerun)
    - command -v pm2 >/dev/null 2>&1 || sudo -n npm i -g pm2

    # Start or restart
    - sudo -n -u deploy bash -lc "cd '$APP_DIR' && pm2 describe prajaakeeya-api >/dev/null 2>&1 && pm2 restart prajaakeeya-api --update-env || pm2 start dist/main.js --name prajaakeeya-api"

    # Persist process list
    - sudo -n -u deploy pm2 save
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'