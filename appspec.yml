version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/prajaakeeya-api

hooks:

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300